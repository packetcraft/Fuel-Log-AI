<script>
    const state = {
        logs: [],
        vehicles: [],
        lastPrice: 0,
        chart: null,
        colors: ["#1a1a1a", "#fde047", "#28a745", "#dc3545", "#fd7e14"],
        vehicleColorCount: 4,
        predictions: {},
        efficiencies: {},
        logFilter: 'ALL',
        logVisible: 50,
        chartPeriod: 'ALL'
    };

    const ui = {
        loading: (t) => {
            document.getElementById("loadText").textContent = t;
            document.getElementById("loadingOverlay").style.display = "flex";
        },
        hideLoading: () => document.getElementById("loadingOverlay").style.display = "none",
        toast: (text) => {
            const container = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = text;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3300);
        }
    };

    function esc(s) {
        return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function safeUrl(url) {
        try {
            const u = new URL(url);
            return (u.protocol === 'https:' || u.protocol === 'http:') ? url : '#';
        } catch { return '#'; }
    }

    function updateDateDisplay() {
        const val = document.getElementById('refill-date').value;
        const el = document.getElementById('dateText');
        if (!val || !el) return;
        const d = new Date(val + 'T00:00:00');
        el.textContent = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const target = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', target);
        localStorage.setItem('theme', target);
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
        document.getElementById("refill-date").value = new Date().toISOString().split("T")[0];
        updateDateDisplay();
        if (navigator.geolocation && !document.getElementById("pump-location").value) {
            navigator.geolocation.getCurrentPosition(() => {}, (err) => console.log("Auto-GPS failed", err), { timeout: 5000 });
        }

        const qtyField = document.getElementById('fuel-qty');
        qtyField.addEventListener('input', () => qtyField.classList.toggle('qty-empty', !qtyField.value));
        qtyField.classList.add('qty-empty');

        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('scanMenuWrapper');
            if (wrapper && !wrapper.contains(e.target)) closeScanMenu();
        });

        syncData();
    };

    function addVehicle() {
        const row = document.getElementById('newVehicleRow');
        row.classList.remove('hidden');
        document.getElementById('newVehicleInput').focus();
    }

    function confirmVehicle() {
        const input = document.getElementById('newVehicleInput');
        const n = input.value.trim();
        if (n) {
            if (!state.vehicles.includes(n)) state.vehicles.push(n);
            const s = document.getElementById("vehicleSelect");
            s.add(new Option(n, n));
            s.value = n;
            renderVehicleSelector(n);
            predictOdometer(n);
            google.script.run.addVehicle(n);
        }
        input.value = '';
        document.getElementById('newVehicleRow').classList.add('hidden');
    }

    function renderVehicleSelector(selectedVehicle) {
        const s = document.getElementById("vehicleSelect");
        const rg = document.getElementById("vehicleRadioGroup");
        if (state.vehicles.length > 0 && state.vehicles.length <= 4) {
            s.style.display = 'none';
            rg.style.display = 'flex';
            rg.innerHTML = state.vehicles.map((v, i) => {
                const cls = `btn-color-${i % state.vehicleColorCount}`;
                return `<div role="radio" aria-checked="${v === selectedVehicle ? 'true' : 'false'}" tabindex="0" class="vehicle-radio ${cls}" data-vehicle="${esc(v)}" onclick="selectVehicle(this.dataset.vehicle, this)" onkeydown="if(event.key==='Enter'||event.key===' ')selectVehicle(this.dataset.vehicle,this)">${esc(v)}</div>`;
            }).join('');
            const active = Array.from(rg.children).find(c => c.dataset.vehicle === selectedVehicle);
            if (active) active.classList.add('selected');
            const hint = document.getElementById('vehicleScrollHint');
            if (hint) setTimeout(() => hint.classList.toggle('hidden', rg.scrollWidth <= rg.clientWidth), 50);
        } else {
            s.style.display = 'block';
            rg.style.display = 'none';
        }
    }

    function selectFuelType(type, highlight = false) {
        document.getElementById('fuelType').value = type;
        document.querySelectorAll('#fuelTypeChips .fuel-chip').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.fuel === type);
            if (highlight && btn.dataset.fuel === type) {
                btn.classList.add('ring-2', 'ring-yellow-400');
                setTimeout(() => btn.classList.remove('ring-2', 'ring-yellow-400'), 3000);
            }
        });
    }

    function toggleFullTank() {
        const cb = document.getElementById('ft');
        cb.checked = !cb.checked;
        const btn = document.getElementById('fullTankToggle');
        btn.textContent = cb.checked ? '✓ Full' : 'Partial';
        btn.classList.toggle('tank-toggle-full', cb.checked);
        btn.classList.toggle('tank-toggle-partial', !cb.checked);
    }

    function toggleScanMenu() { document.getElementById('scanMenu').classList.toggle('hidden'); }
    function closeScanMenu() { document.getElementById('scanMenu').classList.add('hidden'); }

    function setTab(idx) {
        document.querySelectorAll(".tab-panel").forEach((p, i) => p.classList.toggle("active", i === idx));
        document.querySelectorAll(".nav-btn").forEach((b, i) => {
            b.classList.toggle("nav-active", i === idx);
            b.classList.toggle("text-gray-400", i !== idx);
            b.setAttribute('aria-selected', i === idx ? 'true' : 'false');
        });
        if (idx === 1) renderLogs();
        if (idx === 2) renderStats();
        if (idx === 3) loadMarket();
    }

    function calculatePredictions() {
        state.predictions = {};
        state.vehicles.forEach(v => {
            const vLogs = state.logs.filter(l => l.vehicle_name === v).sort((a, b) => new Date(a.refill_date) - new Date(b.refill_date));
            if (vLogs.length > 0) {
                const lastLog = vLogs[vLogs.length - 1];
                let avg = 0;
                if (vLogs.length >= 2) {
                    const firstLog = vLogs[0];
                    const totalDist = parseFloat(lastLog.km_reading) - parseFloat(firstLog.km_reading);
                    const totalDays = (new Date(lastLog.refill_date) - new Date(firstLog.refill_date)) / (1000 * 60 * 60 * 24);
                    if (totalDays > 0) avg = totalDist / totalDays;
                }
                state.predictions[v] = {
                    lastKM: parseFloat(lastLog.km_reading),
                    lastDate: new Date(lastLog.refill_date),
                    avgKmPerDay: avg
                };
            }
        });
    }

    function calculateEfficiencies() {
        state.efficiencies = {};
        state.vehicles.forEach(v => {
            const vLogs = state.logs
                .filter(l => l.vehicle_name === v)
                .sort((a, b) => new Date(a.refill_date) - new Date(b.refill_date));

            let accumulatedFuel = 0;
            let lastFullKM = -1;

            vLogs.forEach((log) => {
                const isFull = log.full_tank === true || log.full_tank === "true";
                const currentKM = parseFloat(log.km_reading);
                const currentFuel = parseFloat(log.fuel_qty);

                if (isFull) {
                    if (lastFullKM > 0) {
                        const distSinceFull = currentKM - lastFullKM;
                        const totalFuelSpent = accumulatedFuel + currentFuel;
                        if (distSinceFull > 0 && totalFuelSpent > 0) {
                            const dateKey = log.refill_date.split("T")[0];
                            const key = `${dateKey}_${v}`;
                            if (state.efficiencies[key] === undefined) {
                                state.efficiencies[key] = distSinceFull / totalFuelSpent;
                            }
                        }
                    }
                    lastFullKM = currentKM;
                    accumulatedFuel = 0;
                } else {
                    accumulatedFuel += currentFuel;
                }
            });
        });
    }

    function predictOdometer(v) {
        const kInput = document.getElementById('km-reading');
        if (kInput.value && kInput.value !== "0") return;

        const pred = state.predictions[v];
        if (pred && pred.avgKmPerDay > 0) {
            const daysSince = (new Date() - pred.lastDate) / (1000 * 60 * 60 * 24);
            const predictedKM = pred.lastKM + (pred.avgKmPerDay * daysSince);
            kInput.value = Math.round(predictedKM * 10) / 10;
            kInput.classList.add('ring-2', 'ring-blue-400');
            setTimeout(() => kInput.classList.remove('ring-2', 'ring-blue-400'), 2000);
            ui.toast("Predicted Odometer " + kInput.value);
        } else if (pred) {
            kInput.value = pred.lastKM;
        }
    }

    function syncData() {
        ui.loading("Syncing...");
        google.script.run
            .withSuccessHandler((res) => {
                ui.hideLoading();
                if (!res.success) return ui.toast(res.error || "Sync Failed");

                state.logs = res.data;
                state.vehicles = res.vehicles;
                state.lastPrice = res.lastPrice;

                calculatePredictions();
                calculateEfficiencies();

                const stations = [...new Set(state.logs.map(l => l.pump_location).filter(s => s?.trim()))].sort();
                document.getElementById('stationOptions').innerHTML = stations.map(s => `<option value="${esc(s)}">`).join('');

                if (state.lastPrice > 0 && !document.getElementById('fuel-price').value) {
                    document.getElementById('fuel-price').value = state.lastPrice;
                }

                const s = document.getElementById("vehicleSelect");
                const currentVal = s.value;
                s.innerHTML = state.vehicles.length ? '' : '<option value="My Car">My Car</option>';
                state.vehicles.forEach(v => s.add(new Option(v, v)));
                if (currentVal && state.vehicles.includes(currentVal)) s.value = currentVal;

                renderVehicleSelector(s.value);
                if (s.value) predictOdometer(s.value);
                buildLogFilterPills();
            })
            .withFailureHandler(err => { ui.hideLoading(); ui.toast("Error: " + err.message); })
            .getFuelData();
    }

    function selectVehicle(v, el) {
        document.getElementById("vehicleSelect").value = v;
        document.querySelectorAll('.vehicle-radio').forEach(d => {
            d.classList.remove('selected');
            d.setAttribute('aria-checked', 'false');
        });
        if (el) {
            el.classList.add('selected');
            el.setAttribute('aria-checked', 'true');
        }
        predictOdometer(v);
    }

    function calculateTotal() {
        const q = parseFloat(document.getElementById("fuel-qty").value) || 0;
        const p = parseFloat(document.getElementById("fuel-price").value) || 0;
        const total = (q * p).toFixed(2);
        document.getElementById("refill-total").value = total;
        document.getElementById("t_display").textContent = total;
    }

    function submitEntry(e) {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        data.full_tank = document.getElementById("ft").checked;
        if (!data.pump_location?.trim()) data.pump_location = "";

        ui.loading("Saving...");
        google.script.run
            .withSuccessHandler(() => {
                ui.hideLoading();
                showMissionReport(data);
                e.target.reset();
                document.getElementById("refill-date").value = new Date().toISOString().split("T")[0];
                updateDateDisplay();
                document.getElementById("pump-location").value = "";
                selectFuelType('petrol');
                const ftBtn = document.getElementById('fullTankToggle');
                ftBtn.textContent = '✓ Full';
                ftBtn.classList.add('tank-toggle-full');
                ftBtn.classList.remove('tank-toggle-partial');
                document.getElementById('fuel-qty').classList.add('qty-empty');
                document.getElementById('notes').rows = 1;
                const firstRadio = document.querySelector('.vehicle-radio');
                if (firstRadio) {
                    document.querySelectorAll('.vehicle-radio').forEach(d => d.classList.remove('selected'));
                    firstRadio.classList.add('selected');
                    document.getElementById('vehicleSelect').value = firstRadio.dataset.vehicle;
                }
                setTimeout(syncData, 1000);
            })
            .withFailureHandler(err => { ui.hideLoading(); ui.toast("Error: " + err.message); })
            .saveEntryDirect(data);
    }

    function showMissionReport(entry) {
        const el = document.getElementById("missionReport");
        const vLogs = state.logs
            .filter(l => l.vehicle_name === entry.vehicle_name)
            .sort((a, b) => new Date(b.refill_date) - new Date(a.refill_date));

        let eff = "--", grade = "B", trend = "STABLE";

        if (entry.full_tank && vLogs.length > 0) {
            let accumulatedFuel = 0;
            let lastFullLog = null;

            for (const log of vLogs) {
                const isFull = log.full_tank === true || log.full_tank === "true";
                if (isFull) { lastFullLog = log; break; }
                accumulatedFuel += parseFloat(log.fuel_qty) || 0;
            }

            if (lastFullLog) {
                const dist = parseFloat(entry.km_reading) - parseFloat(lastFullLog.km_reading);
                const totalFuel = accumulatedFuel + parseFloat(entry.fuel_qty);
                if (dist > 0 && totalFuel > 0) {
                    const eVal = dist / totalFuel;
                    eff = eVal.toFixed(1);
                    grade = eVal > 22 ? "S" : (eVal > 18 ? "A" : (eVal > 15 ? "B" : "C"));
                }
            }
        }

        document.getElementById("effVal").innerHTML = `${eff} <span class="text-xs">KM/L</span>`;
        document.getElementById("effTrend").textContent = trend;
        document.getElementById("grade").textContent = grade;
        el.style.display = 'flex';
        setTimeout(() => el.style.display = "none", 6000);
    }

    function buildLogFilterPills() {
        const bar = document.getElementById("logFilterBar");
        if (!bar) return;
        const pills = ['ALL', ...state.vehicles];
        bar.innerHTML = pills.map(v =>
            `<button class="log-filter-pill text-[0.6rem] font-black uppercase tracking-wider px-3 py-1.5 rounded border-2 border-[var(--border)] transition-colors ${v === state.logFilter ? 'bg-black text-white' : 'bg-white text-black'}" aria-pressed="${v === state.logFilter ? 'true' : 'false'}" data-v="${esc(v)}" onclick="setLogFilter(this.dataset.v)">${esc(v)}</button>`
        ).join('');
    }

    function setLogFilter(v) {
        state.logFilter = v;
        state.logVisible = 50;
        document.querySelectorAll('.log-filter-pill').forEach(p => {
            const active = p.dataset.v === v;
            p.setAttribute('aria-pressed', active ? 'true' : 'false');
            p.classList.toggle('bg-black', active);
            p.classList.toggle('text-white', active);
            p.classList.toggle('bg-white', !active);
            p.classList.toggle('text-black', !active);
        });
        renderLogs();
    }

    function renderLogs() {
        const container = document.getElementById("logList");
        const isRawCoord = s => /^-?\d+\.?\d*,\s*-?\d+\.?\d*$/.test((s || '').trim());

        const filtered = state.logFilter === 'ALL'
            ? state.logs
            : state.logs.filter(e => e.vehicle_name === state.logFilter);

        if (!filtered.length) {
            container.innerHTML = `<div class="text-center p-8 text-gray-400 font-black uppercase text-xs">No records found</div>`;
            return;
        }

        const visible = filtered.slice(0, state.logVisible);
        let lastMonth = '';
        let html = '';

        visible.forEach(e => {
            const isFull = e.full_tank == true || e.full_tank == "true";
            const dateKey = e.refill_date.split("T")[0];
            const d = new Date(dateKey + 'T00:00:00');
            const monthKey = d.toLocaleString('default', { month: 'short', year: 'numeric' }).toUpperCase();

            if (monthKey !== lastMonth) {
                html += `<div class="px-4 pt-3 pb-1 text-[0.65rem] font-black uppercase tracking-widest opacity-40 border-b border-[var(--border)] bg-[var(--bg)]">${esc(monthKey)}</div>`;
                lastMonth = monthKey;
            }

            const eff = isFull ? state.efficiencies[`${dateKey}_${e.vehicle_name}`] : null;
            let effColor = '', effText = '';
            if (eff && eff > 0) {
                effColor = eff >= 15 ? 'text-green-600' : (eff >= 10 ? 'text-yellow-600' : 'text-red-500');
                effText = eff.toFixed(1);
            }

            const fuelType = (e.fuel_type || '').toLowerCase();
            const fuelBadgeColor = fuelType === 'diesel' ? 'bg-yellow-100 text-yellow-800'
                : fuelType === 'cng' ? 'bg-green-100 text-green-800'
                : 'bg-blue-100 text-blue-800';

            const location = e.pump_location && !isRawCoord(e.pump_location) ? e.pump_location : '';
            const kmReading = parseFloat(e.km_reading);

            html += `
            <div class="log-card p-4 border-b-2 border-[var(--border)] last:border-0 grid grid-cols-[1fr_auto] gap-2 active:bg-black/5 transition-colors">
                <div>
                    <div class="text-[0.6rem] font-black opacity-50 uppercase tracking-tighter">${esc(dateKey)}</div>
                    <div class="font-black text-sm uppercase">${esc(e.vehicle_name)}</div>
                    <div class="flex items-center gap-2 mt-1 flex-wrap">
                        <span class="text-[0.6rem] font-black border-2 border-[var(--border)] px-1.5 py-0.5 rounded bg-white text-black">${parseFloat(e.fuel_qty).toFixed(2)}L</span>
                        <span class="text-[0.65rem] font-black ${isFull ? 'text-green-600' : 'text-orange-500'} uppercase">${isFull ? 'Full' : 'Partial'}</span>
                        ${fuelType ? `<span class="text-[0.65rem] font-black px-1.5 py-0.5 rounded uppercase ${fuelBadgeColor}">${esc(fuelType)}</span>` : ''}
                        ${effText ? `<span class="text-[0.6rem] font-black ${effColor} uppercase">${esc(effText)} KM/L</span>` : ''}
                    </div>
                    ${location ? `<div class="text-[0.6rem] opacity-60 mt-1 truncate max-w-[180px] font-medium italic">${esc(location)}</div>` : ''}
                </div>
                <div class="text-right flex flex-col justify-center">
                    <div class="text-xl font-black leading-none">₹${parseFloat(e.refill_amount).toFixed(0)}</div>
                    <div class="text-[0.6rem] font-black opacity-40 mt-1">₹${parseFloat(e.fuel_price).toFixed(2)}/L</div>
                    ${kmReading > 0 ? `<div class="text-[0.6rem] font-black opacity-30 mt-0.5">↑ ${kmReading.toLocaleString('en-IN')} km</div>` : ''}
                </div>
            </div>`;
        });

        if (filtered.length > state.logVisible) {
            const remaining = Math.min(25, filtered.length - state.logVisible);
            html += `<button onclick="state.logVisible += 25; renderLogs();" class="w-full py-3 text-[0.6rem] font-black uppercase tracking-widest opacity-50 hover:opacity-100 transition-opacity border-t-2 border-[var(--border)]">Load ${remaining} more ↓</button>`;
        }

        container.innerHTML = html;
    }

    function renderStats() {
        const grid = document.getElementById("statsGrid");
        grid.innerHTML = "";
        const allPointsMap = {};
        const allDatesSet = new Set();
        let fleetKm = 0, fleetLiters = 0, fleetSpend = 0;

        state.vehicles.forEach((v, idx) => {
            const logs = state.logs
                .filter(e => e.vehicle_name === v)
                .sort((a, b) => new Date(a.refill_date) - new Date(b.refill_date));

            const fuel = logs.reduce((s, e) => s + (parseFloat(e.fuel_qty) || 0), 0);
            const spend = logs.reduce((s, e) => s + (parseFloat(e.refill_amount) || 0), 0);
            const odos = logs.map(e => parseFloat(e.km_reading) || 0).filter(k => k > 0);
            const dist = odos.length > 1 ? Math.max(...odos) - Math.min(...odos) : 0;
            const costPerKm = dist > 0 && spend > 0 ? (spend / dist).toFixed(2) : null;

            const vEffVals = Object.entries(state.efficiencies)
                .filter(([k]) => k.endsWith('_' + v))
                .map(([, val]) => val);
            const eff = vEffVals.length > 0
                ? (vEffVals.reduce((a, b) => a + b, 0) / vEffVals.length).toFixed(2)
                : "0.0";
            const color = state.colors[idx % state.colors.length];

            fleetKm += dist;
            fleetLiters += fuel;
            fleetSpend += spend;

            allPointsMap[v] = {};
            let accFuel = 0, lastFullKM = -1;
            logs.forEach(log => {
                const isFull = log.full_tank === true || log.full_tank === "true";
                const km = parseFloat(log.km_reading);
                const qty = parseFloat(log.fuel_qty);
                if (isFull) {
                    if (lastFullKM > 0) {
                        const d = km - lastFullKM, f = accFuel + qty;
                        if (d > 0 && f > 0) {
                            const dk = log.refill_date.split("T")[0];
                            allPointsMap[v][dk] = (d / f).toFixed(2);
                            allDatesSet.add(dk);
                        }
                    }
                    lastFullKM = km;
                    accFuel = 0;
                } else {
                    accFuel += qty;
                }
            });

            const effVals = Object.entries(allPointsMap[v])
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([, val]) => parseFloat(val));
            const allAvg = effVals.length ? effVals.reduce((a, b) => a + b, 0) / effVals.length : 0;
            const recentSlice = effVals.slice(-3);
            const recentAvg = recentSlice.length ? recentSlice.reduce((a, b) => a + b, 0) / recentSlice.length : 0;
            let trendArrow = '→', trendCls = 'opacity-30';
            if (effVals.length >= 2 && allAvg) {
                const delta = (recentAvg - allAvg) / allAvg;
                if (delta > 0.05) { trendArrow = '↑'; trendCls = 'text-green-600'; }
                else if (delta < -0.05) { trendArrow = '↓'; trendCls = 'text-red-500'; }
            }

            const best = effVals.length ? Math.max(...effVals).toFixed(1) : null;
            const worst = effVals.length ? Math.min(...effVals).toFixed(1) : null;

            grid.innerHTML += `
                <div class="neo-card p-4">
                    <div class="flex justify-between items-start">
                        <span class="text-xs font-black uppercase opacity-70">${esc(v)}</span>
                        <div class="text-right leading-none">
                            <span class="text-2xl font-black" style="color:${color}">${eff}</span>
                            <span class="text-xs font-black opacity-60"> KM/L</span>
                            ${effVals.length >= 2 ? `<span class="text-base font-black ${trendCls} ml-1">${trendArrow}</span>` : ''}
                        </div>
                    </div>
                    ${best ? `<div class="flex gap-3 mt-2 text-[0.6rem] font-black uppercase">
                        <span class="text-green-600">↑ Best ${best}</span>
                        <span class="text-red-500">↓ Worst ${worst}</span>
                        <span class="opacity-40">${effVals.length} fills</span>
                    </div>` : ''}
                    ${costPerKm ? `<div class="flex justify-between mt-2 pt-2 border-t border-[var(--border)] text-[0.6rem] font-black uppercase opacity-60">
                        <span>₹${costPerKm}/km</span>
                        <span>₹${Math.round(spend).toLocaleString('en-IN')} total</span>
                    </div>` : ''}
                </div>`;
        });

        const summaryBar = document.getElementById("statsSummaryBar");
        if (summaryBar) {
            summaryBar.innerHTML = [
                { label: 'Tracked KM', value: fleetKm > 0 ? Math.round(fleetKm).toLocaleString('en-IN') : '—' },
                { label: 'Total Liters', value: fleetLiters > 0 ? fleetLiters.toFixed(0) + ' L' : '—' },
                { label: 'Total Spend', value: fleetSpend > 0 ? '₹' + Math.round(fleetSpend).toLocaleString('en-IN') : '—' }
            ].map(item => `
                <div>
                    <p class="text-[0.65rem] font-black uppercase opacity-50 tracking-widest">${item.label}</p>
                    <p class="text-base font-black">${item.value}</p>
                </div>`).join('');
        }

        const sortedDates = Array.from(allDatesSet).sort();
        let filteredDates = sortedDates;
        if (state.chartPeriod !== 'ALL') {
            const months = state.chartPeriod === '3M' ? 3 : 6;
            const cutoff = new Date();
            cutoff.setMonth(cutoff.getMonth() - months);
            filteredDates = sortedDates.filter(d => d >= cutoff.toISOString().split('T')[0]);
        }

        const displayLabels = filteredDates.map(d => {
            const dt = new Date(d + 'T00:00:00');
            return dt.toLocaleString('default', { month: 'short' }) + ' ' + dt.getDate();
        });

        const pillContainer = document.getElementById("chartPeriodFilter");
        if (pillContainer) {
            pillContainer.innerHTML = ['3M', '6M', 'ALL'].map(p =>
                `<button class="period-pill text-[0.6rem] font-black uppercase tracking-widest px-3 py-1.5 rounded border-2 border-[var(--border)] transition-colors ${state.chartPeriod === p ? 'bg-[var(--text)] text-[var(--card-bg)]' : 'bg-[var(--card-bg)] text-[var(--text)]'}" data-p="${p}" onclick="setChartPeriod('${p}')">${p}</button>`
            ).join('');
        }

        const datasets = state.vehicles.map((v, idx) => {
            if (!allPointsMap[v] || !Object.keys(allPointsMap[v]).length) return null;
            const color = state.colors[idx % state.colors.length];
            const chartData = filteredDates.map(date => allPointsMap[v][date] || null);
            if (chartData.every(val => val === null)) return null;
            return {
                label: v,
                data: chartData,
                borderColor: color,
                backgroundColor: color + '11',
                tension: 0.3,
                fill: true,
                borderWidth: 3,
                pointRadius: 4,
                pointHoverRadius: 6,
                spanGaps: true
            };
        }).filter(Boolean);

        if (datasets.length === 0) {
            grid.innerHTML += `<div class="neo-card p-6 text-center text-xs font-black uppercase opacity-50 col-span-full">Not enough data yet — log at least 2 full-tank refills per vehicle</div>`;
            if (state.chart) { state.chart.destroy(); state.chart = null; }
            return;
        }

        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const tickColor = isDark ? '#e0e0e0' : '#1a1a1a';
        const gridColor = isDark ? '#ffffff22' : '#00000022';

        if (state.chart) state.chart.destroy();
        state.chart = new Chart(document.getElementById("effChart"), {
            type: "line",
            data: { labels: displayLabels, datasets },
            options: {
                responsive: true,
                scales: {
                    y: { grid: { color: gridColor }, ticks: { font: { weight: '800', size: 10 }, color: tickColor } },
                    x: { grid: { display: false }, ticks: { font: { weight: '800', size: 10 }, color: tickColor, maxRotation: 45 } }
                },
                plugins: {
                    legend: { labels: { font: { weight: '800' }, color: tickColor } },
                    tooltip: {
                        enabled: true,
                        callbacks: {
                            label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + ' KM/L'
                        }
                    }
                }
            }
        });
    }

    function setChartPeriod(p) {
        state.chartPeriod = p;
        renderStats();
    }

    function renderMarket(m) {
        document.getElementById("mCity").textContent = `REGION: ${m.city.toUpperCase()}`;
        document.getElementById("mInsight").textContent = m.insight;
        document.getElementById("mMarket").innerHTML = `
            <div class="neo-card p-4 bg-[var(--primary)]/5">
                <p class="text-[0.6rem] font-black uppercase opacity-60">Petrol</p>
                <p class="text-2xl font-black">${m.petrol ? '₹' + m.petrol : 'N/A'}</p>
            </div>
            <div class="neo-card p-4 bg-[var(--primary)]/5">
                <p class="text-[0.6rem] font-black uppercase opacity-60">Diesel</p>
                <p class="text-2xl font-black">${m.diesel ? '₹' + m.diesel : 'N/A'}</p>
            </div>`;
        document.getElementById("mSources").innerHTML = (m.sources || []).map(s =>
            `<a href="${safeUrl(s.url)}" target="_blank" rel="noopener noreferrer" class="block p-3 neo-card text-[0.65rem] font-black uppercase hover:bg-black/5 transition-colors">Source: ${esc(s.title)} ↗</a>`
        ).join("");
    }

    function loadMarket() {
        const CACHE_KEY = 'fuellog_market';
        const CACHE_TTL = 4 * 60 * 60 * 1000;
        try {
            const cached = sessionStorage.getItem(CACHE_KEY);
            if (cached) {
                const { data, timestamp } = JSON.parse(cached);
                if (Date.now() - timestamp < CACHE_TTL) {
                    renderMarket(data);
                    return;
                }
            }
        } catch (e) { console.warn("Market cache read failed:", e); }

        ui.loading("Scanning live prices...");
        navigator.geolocation.getCurrentPosition((p) => {
            google.script.run
                .withSuccessHandler((res) => {
                    ui.hideLoading();
                    if (!res?.success) return ui.toast(res.error || "Market API Error");
                    try {
                        sessionStorage.setItem(CACHE_KEY, JSON.stringify({ data: res.market, timestamp: Date.now() }));
                    } catch (e) { console.warn("Market cache write failed:", e); }
                    renderMarket(res.market);
                })
                .withFailureHandler(err => { ui.hideLoading(); ui.toast(err.message || "Market Data Unavailable"); })
                .getMarketData(p.coords.latitude, p.coords.longitude, state.lastPrice);
        }, () => { ui.hideLoading(); ui.toast("Location Denied"); });
    }

    function fetchGPS() {
        navigator.geolocation.getCurrentPosition((p) => {
            document.getElementById("pump-location").value = `${p.coords.latitude.toFixed(3)},${p.coords.longitude.toFixed(3)}`;
        }, () => ui.toast("GPS Signal Lost"), { enableHighAccuracy: true, timeout: 5000 });
    }

    function openScanner(force) {
        const input = document.getElementById('cam');
        force ? input.setAttribute('capture', 'environment') : input.removeAttribute('capture');
        input.click();
    }

    function processImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement("canvas");
                const max = 1200;
                let w = img.width, h = img.height;
                if (w > max || h > max) {
                    if (w > h) { h *= max / w; w = max; }
                    else { w *= max / h; h = max; }
                }
                canvas.width = w; canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);

                const targetIds = ['fuel-qty', 'fuel-price', 'refill-date', 'notes', 'fuelType'];
                targetIds.forEach(id => document.getElementById(id).classList.add('shimmer'));

                ui.loading("Scanning Receipt...");
                google.script.run
                    .withSuccessHandler((res) => {
                        ui.hideLoading();
                        targetIds.forEach(id => document.getElementById(id).classList.remove('shimmer'));
                        if (!res?.success) return ui.toast(res.error || "AI Scan Failed");

                        if (res.data.fuel_type) selectFuelType(res.data.fuel_type, true);
                        const mapping = { 'fuel_qty': 'fuel-qty', 'fuel_price': 'fuel-price', 'refill_date': 'refill-date', 'notes': 'notes' };
                        Object.entries(mapping).forEach(([key, id]) => {
                            const el = document.getElementById(id);
                            if (res.data[key] && el) {
                                el.value = res.data[key];
                                el.classList.add('ring-2', 'ring-yellow-400');
                                setTimeout(() => el.classList.remove('ring-2', 'ring-yellow-400'), 3000);
                            }
                        });
                        calculateTotal();
                        const notesField = document.getElementById('notes');
                        const aiNotes = res.data.notes || "";
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                const gpsString = `GPS: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
                                notesField.value = aiNotes ? `${aiNotes} | ${gpsString}` : gpsString;
                                ui.toast("SCANNED + GPS ADDED");
                            },
                            () => {
                                if (aiNotes) notesField.value = aiNotes;
                                ui.toast("SCANNED (NO GPS)");
                            },
                            { timeout: 4000, enableHighAccuracy: true }
                        );
                    })
                    .withFailureHandler(err => {
                        ui.hideLoading();
                        targetIds.forEach(id => document.getElementById(id).classList.remove('shimmer'));
                        ui.toast("AI Error");
                    })
                    .processReceiptWithAI(canvas.toDataURL("image/jpeg", 0.7).split(",")[1]);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
